name: Build and Push Frontend

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Login to Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.maliniganesan }}
        password: ${{ secrets.dckr_pat_w8WcS7bNj6lO7VSrwOrEAkLyqDM }}

    # 3. Build image
    - name: Build Docker image
      run: |
        docker build -t maliniganesan/car-rental-frontend:latest .

    # 4. Push image
    - name: Push Docker image
      run: |
        docker push maliniganesan/car-rental-frontend:latest
