<div class="card">
  <h2>Edit Car</h2>
  <form [formGroup]="carForm" (ngSubmit)="submit()">
    <input formControlName="name" placeholder="Car Name" />
    <select formControlName="categoryId">
      <option *ngFor="let c of categories" [value]="c.id">{{c.name}}</option>
    </select>
    <input formControlName="pricePerHour" placeholder="Price per Hour" />
    <input formControlName="pricePerDay" placeholder="Price per Day" />
    <input formControlName="pricePerWeek" placeholder="Price per Week" />
    <select formControlName="insurancePlanId">
      <option *ngFor="let i of insurancePlans" [value]="i.id">{{i.name}}</option>
    </select>
    <input type="file" (change)="onFileChange($event)" />
    <button type="submit">Update Car</button>
  </form>
</div>
