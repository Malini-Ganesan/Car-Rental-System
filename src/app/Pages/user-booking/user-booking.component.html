<h2>My Bookings</h2>

<table *ngIf="bookings.length > 0">
  <thead>
    <tr>
      <th>Car Name</th>
      <th *ngIf="isAdmin">User Name</th>
      <th>Start Date</th>
      <th>End Date</th>
      <th>Location</th>
      <th>Total Price</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let b of bookings">
      <td>{{ b.carName }}</td>
       <td *ngIf="isAdmin">{{ b.userName }}</td>
      <td>{{ b.startDate | date: 'shortDate' }}</td>
      <td>{{ b.endDate | date: 'shortDate' }}</td>
      <td>{{ b.location }}</td>
      <td>{{ b.totalPrice | currency }}</td>
    </tr>
  </tbody>
</table>

<p *ngIf="bookings.length === 0">You have no bookings yet.</p>
