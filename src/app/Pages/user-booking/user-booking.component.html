    <h2>My Bookings</h2>
<div class="booking-wrapper">
  <div class="booking-container">
<table *ngIf="bookings.length > 0">
  <thead>
    <tr>
      <th>Car Name</th>
      <th *ngIf="isAdmin">User</th>
      <th>Start Date</th>
      <th>End Date</th>
      <th>Location</th>
      <th>Total Price</th>
      <th>Cancel booking</th>
      <th *ngIf="isAdmin">Status</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let b of bookings">
      <td>{{ b.carName }}</td>
       <td *ngIf="isAdmin">{{ b.userName }}</td>
      <td>{{ b.startDate | date: 'shortDate' }}</td>
      <td>{{ b.endDate | date: 'shortDate' }}</td>
      <td>{{ b.location }}</td>
      <td>{{ b.totalPrice | currency }}</td>
      <td>
<button 
  (click)="cancelBooking(b)" 
  [disabled]="b.status === 'Cancelled' || b.isCancelling">
  {{ b.isCancelling ? 'Cancelling...' : 'Cancel' }}
</button>
</td>
<td>
  <span *ngIf="isAdmin" [ngClass]="{
    'status-booked': b.status === 'Booked',
    'status-cancelled': b.status === 'Cancelled'
  }">
    {{ b.status }}
  </span>
</td>
    </tr>
  </tbody>
</table>

<p *ngIf="bookings.length === 0">You have no bookings yet.</p>
</div>
</div>
